# lint: Checks syntax, spellings, indentation in your code when someone makes changes in the code, requires linter
name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    steps: ## clone the code from the current branch into the runner.
      - name: Chekout/Clone the code
        uses: actions/checkout@v7
      # Installing the linting tool
      - name: Install linter
        run: pip install ruff
